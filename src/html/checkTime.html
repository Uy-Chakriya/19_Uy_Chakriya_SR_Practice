<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkTime</title>
    <link rel="stylesheet" href="../output.css">
</head> 
<body>

    <div class="flex m-100 auto item-center justify-center">
        <div class=" my-20 bg-gray-200 p-10 rounded-lg border border-gray-400 max-w-md item-center justify-center">

            <div class="align-center justify-center item center">
                 <label for="time" id="timeBtn" class="p-4 block text-md font-medium text-gray-700  border-2 border-blue-700 rounded-lg">00:00:00</label>
            </div>

            <div>
                <button type="button" id="startBtn" class="bg-green-700 my-10 text-white px-4 py-2 rounded border-radius-lg" onclick="startTimer()">Start</button>
                <button type="button" id="stopBtn" class="bg-red-500 text-white px-4 py-2 rounded border-radius-lg" onclick="stopTimer()">Stop</button>
                <button type="button" id="resetBtn" class="bg-yellow-500 text-white px-4 py-2 rounded border-radius-lg" onclick="resetTimer()">Reset</button>
            </div>
           
        </div>
        <p id="show"></p>
    </div>

    <script src="../Js/checkTime.js"></script>
    
  </body>
</html>
