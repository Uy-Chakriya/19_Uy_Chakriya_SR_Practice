<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phoneValidation</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body >

    <div class="flex m-100 auto item-center justify-center">
         <form action="validatePhone" class="py-20 my-20 bg-gray-200 rounded-lg border shadow-md w-full max-w-md flex item-center justify-center">
        <div class="space-y-4">
            <label for="number" class="block my-5 font-medium text-gray-700">Phone Number</label>
            <input id="number" type="text" name="phone" placeholder="Please enterphone number" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" class="w-full bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-lg transition" onclick="validatePhone()"> Validate</button>

            <p id="show" class="text-sm font-medium"></p>
        </div>
    </form>
    </div>
    
    <script src="../Js/phoneValidation.js"></script>

</body>
</html>
